services:
  localstack:
    container_name: localstack-mediprior
    image: localstack/localstack:3.4.0
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      - DEBUG=1
      - PERSISTENCE=0
      - DOCKER_HOST=unix:///var/run/docker.sock
      - ACTIVATE_PRO=0
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"